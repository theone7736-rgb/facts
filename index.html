<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Tahoma, Verdana, sans-serif;
    margin: 0;
}

.center {
    display: flex;
    flex-direction: column;
    justify-content: center;  /* vertical center */
    align-items: center;      /* horizontal center */
    height: 100vh;
    text-align: center;
}

.butten {
    height: 40px;
    width: 150px;
    background-color: blue;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;  /* center text inside button */
}
</style>
</head>

<body>
<div class="center">
    <h1>Fun facts</h1>
    <div class="butten">Find out more</div>
</div>
</body>
</html>
