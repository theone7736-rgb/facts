<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Tahoma, Verdana, sans-serif;
    margin: 0;
}

/* Main container */
.center {
    display: flex;
    flex-direction: column;
    justify-content: center;  /* vertical centering ONLY */
    height: 100vh;
    padding-left: 10px;       /* optional: small space from left edge */
}

/* Button */
.butten {
    height: 40px;
    width: 150px;
    background-color: blue;
    color: white;

    display: flex;
    align-items: center;      /* center text inside button vertically */
    padding-left: 10px;       /* keeps text from touching edge */
}
</style>
</head>

<body>
<div class="center">
    <h1>Fun facts</h1>
    <div class="butten">Find out more</div>
</div>
</body>
</html>
