<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Tahoma, Verdana, sans-serif;
    margin: 0;
    padding:10px 30px;
}

.butten {
    font-weight: bold;
    font-size:40px;
    height: 100px;
    width: 300px;
    background-color: #0046b8;
    color: black;
    border-radius:15px;
    margin: 10px auto;    /* centers the button box horizontally */
    display: flex;
    align-items: center;  /* centers text inside button vertically */
    justify-content: center;
}
</style>
</head>

<body>
<h1 style="text-align: center; font-size:50px;">Fun facts</h1>
<div id="myButton" class="butten">Click here!!!</div>
<p style="margin-top: 50px;">Want to find your faverout one? I have a list for you.</p>
</body>
<script>
const links = [
    "https://facts.edodnan.com.au/f/four-fours.html",
    "https://facts.edodnan.com.au/f/23birthday.html",
    "https://example.com/3",
    "https://example.com/4",
    "https://example.com/5",
    "https://example.com/6",
    "https://example.com/7",
    "https://example.com/8",
    "https://example.com/9",
    "https://example.com/10",
    "https://example.com/11",
    "https://example.com/12",
    "https://example.com/13",
    "https://example.com/14",
    "https://example.com/15",
    "https://example.com/16",
    "https://example.com/17",
    "https://example.com/18",
    "https://example.com/19",
    "https://example.com/20"
];

function randomLink() {
    const randomIndex = Math.floor(Math.random() * links.length);
    window.location.href = links[randomIndex];
}

document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("myButton").addEventListener("click", randomLink);
});
</script>
</html>
