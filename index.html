<!DOCTYPE html>
<html>
<head>
<style>
.rightleft {
font-size: 40px;
margin-top: 20px;
}
.flashcard{
display: flex;
align-items: center;  /* centers text inside button vertically */
justify-content: center;
margin-bottom: 200px;
}
.question {
font-size: 40px;
text-align: center;
}
.card {
border-radius: 15px;
width: 500px;
hight: 400px;
margin-top: 250px;
border: 5px solid blue;
}
.answer {
font-size: 50px;
color: blue;
text-align: center;
}
a {
    display: block;
    margin: 5px 0;
}
body {
    font-family: Tahoma, Verdana, sans-serif;
    margin: 0;
    padding:10px 30px;
}

.butten {
    font-weight: bold;
    font-size:40px;
    height: 100px;
    width: 300px;
    background-color: #0046b8;
    color: black;
    border-radius:15px;
    margin: 10px auto;    /* centers the button box horizontally */
    display: flex;
    align-items: center;  /* centers text inside button vertically */
    justify-content: center;
}

.list {
border: 1px solid black;
padding: 10px;
border-radius: 15px;
}
</style>
</head>

<body>
<h1 style="text-align: center; font-size:50px;">Fun facts</h1>
<div id="myButton" style="margin-bottom: 50px;" class="butten">Click here!!!</div>
<div class="list">
<p>Want to find your faverout one? I have a list for you.</p>
<a href="https://facts.edodnan.com.au/f/four-fours.html">1. Four fours puzzle</a>
<a href="https://facts.edodnan.com.au/f/Collatz-conjecture.html">2. Collatz conjecture </a>
<a href="https://facts.edodnan.com.au/f/Bertrands-postulate.html">3. Bertrands postulate</a>
<a href="https://facts.edodnan.com.au/f/23birthday.html">4. 23 Birthdays </a>
<a href=""> </a>
<a href=""> </a>
</div>
<div class="flashcard">
<div class="card">
  <div id="question" class="question"></div>
  <div id="answer" class="answer"></div>

<button class="rightleft" onclick="prevCard()">⬅</button>
<button class="rightleft" onclick="nextCard()">➡</button>
</div>
</div>
    
</body>
<script>
const flashcards = [
  { q: "What is 2 + 2?", a: "4" },
  { q: "Capital of France?", a: "Paris" }
];

let index = 0;

function updateCard() {
  document.getElementById("question").textContent = flashcards[index].q;
  document.getElementById("answer").textContent = flashcards[index].a;
}

function nextCard() {
  index = (index + 1) % flashcards.length;
  updateCard();
}

function prevCard() {
  index = (index - 1 + flashcards.length) % flashcards.length;
  updateCard();
}

updateCard();
</script>

<script>
const links = [
    "https://facts.edodnan.com.au/f/four-fours.html",
    "https://facts.edodnan.com.au/f/23birthday.html",
    "https://facts.edodnan.com.au/f/Collatz-conjecture.html",
    "https://facts.edodnan.com.au/f/Bertrands-postulate.html"
];

function randomLink() {
    const randomIndex = Math.floor(Math.random() * links.length);
    window.location.href = links[randomIndex];
}

document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("myButton").addEventListener("click", randomLink);
});
</script>
</html>
