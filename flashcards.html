<head>
  <title>Flashcards from facts Edodnan</title>
  <style>
    p {
      margin-left: 90px;
      font-weight: bold;
      font-size: 25px;
    }
    body {
    font-family: Tahoma, Verdana, sans-serif;

}
    .rightleft {
display: flex;
justify-content: center;
}
.flashcard {
display: flex;
align-items: center;  /* centers text inside button vertically */
justify-content: center;
}
.question {
font-size: 35px;
text-align: center;
}
.card {
height: 200px;
padding: 10px;
border-radius: 15px;
width: 500px;
border: 5px solid blue;
}
.answer {
height: 80px;
font-size: 23px;
color: blue;
text-align: center;
}
  </style>
</head>
<body>
  <h1 style="margin-top: 50px; text-align: center; font-size:50px;">Flashcards</h1>
  <p>Top facts: </p>
<div style="margin-bottom: 20px" class="flashcard">
<div class="card">
<div id="Qall" class="question"></div>
<div id="Aall" class="answer"></div>

<div class="rightleft">
<button style="font-size: 30px; margin-right: 5px;" onclick="prevCard()">⬅</button>
<button style="font-size: 30px; margin-left: 5px;" onclick="nextCard()">➡</button>
</div>
</div>
</div>


   <p>Biology brains (Thank you Miguel Rosot to most of the brains): </p>
<div style="margin-bottom: 20px" class="flashcard">
<div class="card">
<div id="Qbiology" class="question"></div>
<div id="Abiology" class="answer"></div>

<div class="rightleft">
<button style="font-size: 30px; margin-right: 5px;" onclick="prevCard()">⬅</button>
<button style="font-size: 30px; margin-left: 5px;" onclick="nextCard()">➡</button>
</div>
</div>
</div>
</body>


<script>
  const flashcards = [
  { q: "Did you know:", a: "Forty is the only number spelled with letters in alphabetical order?" },
  { q: "Did you know:", a: "Every odd number has an 'e' in it?" },
  { q: "Did you know:", a: "A cloud weighs around a million tonnes." },
  { q: "Did you know:", a: "Identical twins don’t have the same fingerprints." },
  { q: "Did you know:", a: "99.9% of the DNA of each person is the same." },
{ q: "Did you know:", a: "The brain cannot feel pain." },
{ q: "Did you know:", a: "Axolotls can regenerate limbs." },
  { q: "Did you know:", a: "There are approximately 5,681,040 people who are born on the 29th of February." },
{ q: "Did you know:", a: "Only hummingbirds can fly backwards." }
];

let index = 0;

function updateCard() {
  document.getElementById("Qall").textContent = flashcards[index].q;
  document.getElementById("Aall").textContent = flashcards[index].a;
}

function nextCard() {
  index = (index + 1) % flashcards.length;
  updateCard();
}

function prevCard() {
  index = (index - 1 + flashcards.length) % flashcards.length;
  updateCard();
}

updateCard();
</script>
