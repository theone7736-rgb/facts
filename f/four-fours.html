<!DOCTYPE html>
<html>
<head>
  <title>The four fours problem</title>
  <style>
    body {
      background-color: #aac9f2;
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    .box {
      background-color: #90bffc;
      font-size: 18px;
      margin-top: 25px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .item {
      margin-bottom: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }

    .result {
      font-size: 18px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>The four fours problem</h2>
<div><a href="https://facts.edodnan.com.au">Want to see the rest? Click here.</a></div>
<!-- SEARCH -->
<input id="search" type="number" placeholder="Enter number">
<button onclick="find()">Search</button>

<div class="result" id="result"></div>
<p>The rules: Every number from 0-100 (and more) can be made from four fourss.</p>
<h3>Full List</h3>
<div class="box" id="list"></div>

<script>
  // =========================
  // 🔧 EDIT YOUR LIST HERE
  // =========================
  const list = {
    0: "44-44",
    1: "44/44",
    2: "4/4+4/4",
    3: "(4+4+4)/4",
    4: "(4-4)x4+4",
    5: "(4x4+4)/4",
    6: "(4+4)/4+4",
    7: "44/4-4",
    8: "4x4-4+4",
    9: "4/4+4+4",
    10: "44/4.4",
    11: "4/.4+4/4",
    12: "4x4-4",
    13: "4!-44/4",
    14: "4×(4−.4)−.4",
    15: "44/4+4",
    16: "4+4+4+4",
    17: "4x4+4/4",
    18: "44x.4+.4",
    19: "4!-4-4/4",
    20: "4x(4/4+4)"
  };

  // =========================
  // SEARCH FUNCTION
  // =========================
  function find() {
    const num = document.getElementById("search").value;
    const result = document.getElementById("result");

    if (list[num] !== undefined) {
      result.innerText = num + " = " + list[num];
    } else {
      result.innerText = num + " has not been found in our database";
    }
  }

  // =========================
  // DISPLAY LIST
  // =========================
  function render() {
    const box = document.getElementById("list");
    box.innerHTML = "";

    const keys = Object.keys(list).sort((a, b) => a - b);

    for (let key of keys) {
      const div = document.createElement("div");
      div.className = "item";
      div.innerText = key + " = " + list[key];
      box.appendChild(div);
    }
  }

  render();
</script>

</body>
</html>
