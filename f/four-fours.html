  // =========================
  // SEARCH FUNCTION
  // =========================
  function find() {
    const num = document.getElementById("search").value;
    const result = document.getElementById("result");

    if (list[num] !== undefined) {
      result.innerText = num + " = " + list[num];
    } else {
      result.innerText = num + " has not been found in our database";
    }
  }

  // =========================
  // DISPLAY LIST
  // =========================
  function render() {
    const box = document.getElementById("list");
    box.innerHTML = "";

    const keys = Object.keys(list).sort((a, b) => a - b);

    for (let key of keys) {
      const div = document.createElement("div");
      div.className = "item";
      div.innerText = key + " = " + list[key];
      box.appendChild(div);
    }
  }

  render();
