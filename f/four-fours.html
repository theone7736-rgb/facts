<!DOCTYPE html>
<html>
<head>
  <title>Custom Number List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    .box {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .item {
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Custom Number List</h2>

<!-- SEARCH -->
<input id="search" type="number" placeholder="Enter number">
<button onclick="find()">Search</button>

<div class="result" id="result"></div>

<h3>Full List</h3>
<div class="box" id="list"></div>

<script>
  // =========================
  // 🔧 EDIT YOUR LIST HERE
  // =========================
  const list = {
    1: "Apple",
    2: "Banana",
    3: "Orange",
    4: "Pizza",
    5: "Minecraft",
    6: "Four Fours Rule"
  };

  // =========================
  // SEARCH FUNCTION
  // =========================
  function find() {
    const num = document.getElementById("search").value;
    const result = document.getElementById("result");

    if (list[num] !== undefined) {
      result.innerText = num + " = " + list[num];
    } else {
      result.innerText = "No value for " + num;
    }
  }

  // =========================
  // DISPLAY LIST
  // =========================
  function render() {
    const box = document.getElementById("list");
    box.innerHTML = "";

    const keys = Object.keys(list).sort((a, b) => a - b);

    for (let key of keys) {
      const div = document.createElement("div");
      div.className = "item";
      div.innerText = key + " = " + list[key];
      box.appendChild(div);
    }
  }

  render();
</script>

</body>
</html>
